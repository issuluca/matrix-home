version: '3.8'

services:
  matrix-home:
    build: .
    container_name: matrix-home
    ports:
      - "8070:8070"
    volumes:
      - matrix-home-data:/app/data
    restart: unless-stopped
    environment:
      - PORT=8070
      - NODE_ENV=production
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8070/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  matrix-home-data:
    driver: local